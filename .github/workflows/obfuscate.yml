name: 🔄 Auto Update Worker

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    name: 🚀 同步和优化 Worker 文件
    runs-on: ubuntu-latest
    steps:
      - name: 📥 初始化代码仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🔧 配置 Git 和安装依赖
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global pull.rebase false
          npm install -g terser javascript-obfuscator

      - name: 🔍 检查本地文件状态（带调试）
        id: check_files
        run: |
          echo "========== 本地文件状态检查 =========="
          # 列出关键文件
          ls -la version.txt source.js _worker.js 2>/dev/null || echo "部分本地文件缺失"
          
          # 初始化变量
          HAS_VERSION="false"
          LOCAL_VERSION="empty"
          
          if [[ -f "version.txt" ]]; then
            HAS_VERSION="true"
            LOCAL_VERSION=$(cat version.txt | tr -d '\n' | tr -d '\r') # 移除换行符
            echo "✅ 本地 version.txt 内容: [${LOCAL_VERSION:0:20}]..."
          else
            echo "❌ 本地 version.txt 不存在"
          fi
          
          # 判定是否强制更新
          if [[ "$HAS_VERSION" == "false" || ! -f "source.js" || ! -f "_worker.js" ]]; then
            echo "🔄 触发强制更新（文件缺失）"
            echo "FORCE_UPDATE=true" >> $GITHUB_ENV
          else
            echo "ℹ️ 无需强制更新"
            echo "FORCE_UPDATE=false" >> $GITHUB_ENV
          fi
          
          # 保存本地版本到环境变量（用于后续比对）
          echo "LOCAL_VERSION_FROM_FILE=$LOCAL_VERSION" >> $GITHUB_ENV

      - name: 🌐 下载远程文件（强制刷新+校验）
        id: download_remote
        run: |
          echo "========== 远程文件下载 =========="
          RAW_URL="https://raw.githubusercontent.com/byJoey/cfnew/refs/heads/main/snippets"
          
          # 强制清除缓存，使用curl参数确保下载最新版本
          curl -f -s -L \
            -H "Cache-Control: no-cache, no-store, must-revalidate" \
            -H "Pragma: no-cache" \
            -H "Expires: 0" \
            -o /tmp/remote_worker.js "$RAW_URL" || { echo "❌ curl下载失败"; exit 1; }
          
          # 校验下载的文件
          FILE_SIZE=$(wc -c < /tmp/remote_worker.js)
          echo "📏 远程文件下载大小: $FILE_SIZE 字节"
          
          if [[ $FILE_SIZE -lt 1000 ]]; then
            echo "❌ 远程文件过小，可能下载不完整"
            cat /tmp/remote_worker.js # 打印文件内容，排查问题
            exit 1
          fi
          
          # 计算哈希（兼容所有系统）
          # 使用sha256sum（ubuntu），并确保只取哈希值
          REMOTE_HASH=$(sha256sum /tmp/remote_worker.js | awk '{print $1}' | tr -d '\n' | tr -d '\r')
          echo "✅ 远程文件哈希: [$REMOTE_HASH:0:20]..."
          
          # 保存到环境变量
          echo "REMOTE_WORKER_HASH=$REMOTE_HASH" >> $GITHUB_ENV
          echo "REMOTE_FILE_SIZE=$FILE_SIZE" >> $GITHUB_ENV
          # 提前截取哈希前16位，避免在表达式中出错
          echo "REMOTE_HASH_SHORT=${REMOTE_HASH:0:16}" >> $GITHUB_ENV

      - name: 🌐 下载远程 README.md（带校验）
        id: download_readme
        run: |
          echo "========== 远程 README.md 下载 =========="
          RAW_README_URL="https://raw.githubusercontent.com/byJoey/cfnew/refs/heads/main/README.md"
          
          curl -f -s -L \
            -H "Cache-Control: no-cache" \
            -o /tmp/README.md "$RAW_URL" || { echo "❌ README下载失败，但继续执行"; }
          
          README_SIZE=$(wc -c < /tmp/README.md 2>/dev/null || echo 0)
          if [[ $README_SIZE -gt 100 ]]; then
            echo "✅ README.md 下载成功，大小: $README_SIZE 字节"
            echo "README_DOWNLOADED=true" >> $GITHUB_ENV
          else
            echo "❌ README.md 下载失败或过小"
            echo "README_DOWNLOADED=false" >> $GITHUB_ENV
          fi

      - name: 📊 版本比对（详细调试日志）
        id: update_decision
        run: |
          echo "========== 版本比对核心步骤 =========="
          # 读取所有关键环境变量
          FORCE_UPDATE="${{ env.FORCE_UPDATE }}"
          LOCAL_HASH="${{ env.LOCAL_VERSION_FROM_FILE }}"
          REMOTE_HASH="${{ env.REMOTE_WORKER_HASH }}"
          
          # 打印所有比对参数（关键调试信息）
          echo "🔍 比对参数："
          echo "   - 强制更新: $FORCE_UPDATE"
          echo "   - 本地哈希: [${LOCAL_HASH:0:20}]..."
          echo "   - 远程哈希: [${REMOTE_HASH:0:20}]..."
          echo "   - 本地哈希完整长度: ${#LOCAL_HASH}"
          echo "   - 远程哈希完整长度: ${#REMOTE_HASH}"
          
          # 核心比对逻辑
          if [[ "$FORCE_UPDATE" == "true" ]]; then
            echo "🔄 决策：强制更新（文件缺失）"
            echo "UPDATE_NEEDED=true" >> $GITHUB_ENV
          elif [[ "$LOCAL_HASH" == "empty" ]]; then
            echo "🔄 决策：首次运行，需要更新"
            echo "UPDATE_NEEDED=true" >> $GITHUB_ENV
          elif [[ "$LOCAL_HASH" == "$REMOTE_HASH" ]]; then
            echo "✅ 决策：哈希一致，无需更新"
            echo "UPDATE_NEEDED=false" >> $GITHUB_ENV
          else
            echo "🔄 决策：哈希不一致，需要更新"
            echo "UPDATE_NEEDED=true" >> $GITHUB_ENV
          fi

      - name: ⬇️ 保存原始文件
        if: env.UPDATE_NEEDED == 'true'
        run: |
          echo "========== 保存原始文件 =========="
          # 覆盖保存source.js
          cp /tmp/remote_worker.js source.js
          echo "✅ source.js 已更新，大小: $(wc -c < source.js) 字节"
          
          # 保存README.md（如果下载成功）
          if [[ "${{ env.README_DOWNLOADED }}" == "true" ]]; then
            cp /tmp/README.md README.md
            echo "✅ README.md 已更新"
          fi

      - name: 🔧 混淆压缩（带容错）
        if: env.UPDATE_NEEDED == 'true'
        run: |
          echo "========== 代码混淆压缩 =========="
          # 第一步：terser压缩
          if ! terser /tmp/remote_worker.js --compress --mangle -o /tmp/min_worker.js; then
            echo "❌ terser失败，使用原始文件"
            cp /tmp/remote_worker.js /tmp/min_worker.js
          fi
          
          # 第二步：混淆（失败则回退）
          if ! javascript-obfuscator /tmp/min_worker.js --output _worker.js \
            --compact true --control-flow-flattening true; then
            echo "❌ 混淆失败，使用压缩文件"
            cp /tmp/min_worker.js _worker.js
          fi
          
          # 最终校验
          FINAL_SIZE=$(wc -c < _worker.js)
          echo "✅ _worker.js 生成完成，大小: $FINAL_SIZE 字节"

      - name: 📝 提交更新（带哈希验证）
        if: env.UPDATE_NEEDED == 'true'
        run: |
          echo "========== 提交更改 =========="
          # 写入最新哈希到version.txt（确保无换行符）
          echo -n "${{ env.REMOTE_WORKER_HASH }}" > version.txt
          
          # 添加所有文件
          git add source.js _worker.js version.txt README.md
          
          # 检查更改
          if git diff --staged --quiet; then
            echo "ℹ️ 无实际更改，跳过提交"
            exit 0
          fi
          
          # 提交并推送（使用提前截取的短哈希）
          git commit -m "🔄 Auto Update Worker
          • 远程哈希: ${{ env.REMOTE_HASH_SHORT }}...
          • 文件大小: ${{ env.REMOTE_FILE_SIZE }} 字节
          • 更新时间: $(date '+%Y-%m-%d %H:%M:%S')"
          git push
          echo "✅ 提交成功"

      - name: 🎯 结果通知
        run: |
          if [[ "${{ env.UPDATE_NEEDED }}" == "true" ]]; then
            # 使用提前截取的短哈希
            echo "🎉 更新完成！远程哈希: ${{ env.REMOTE_HASH_SHORT }}..."
          else
            echo "😴 无需更新，本地哈希与远程一致"
          fi

  cleanup:
    name: 🧹 清理工作流记录
    runs-on: ubuntu-latest
    needs: update
    if: always()
    steps:
      - name: 🗑️ 删除旧记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 3
