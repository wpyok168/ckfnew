name: 🔄 Auto Update Worker (Fix 1101)

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    name: 🚀 自动更新并修复 CF 1101 特征码
    runs-on: ubuntu-latest
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🔧 配置 Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global pull.rebase false

      - name: 🔍 检查本地文件
        id: check
        run: |
          if [[ -f "version.txt" ]]; then
            echo "LOCAL_VER=$(cat version.txt)" >> $GITHUB_ENV
            echo "HAS_VER=1" >> $GITHUB_ENV
          else
            echo "HAS_VER=0" >> $GITHUB_ENV
          fi

      - name: 🌐 获取远程文件
        id: remote
        run: |
          URL="https://raw.githubusercontent.com/byJoey/cfnew/refs/heads/main/%E6%98%8E%E6%96%87%E6%BA%90%E5%90%97"
          curl -f -s -o /tmp/remote.js "$URL"
          HASH=$(sha256sum /tmp/remote.js | head -c16)
          echo "REMOTE_HASH=$HASH" >> $GITHUB_ENV

      - name: 📊 判断是否需要更新
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "UPDATE=1" >> $GITHUB_ENV
          elif [[ "$HAS_VER" == "1" && "$LOCAL_VER" == "$REMOTE_HASH" ]]; then
            echo "UPDATE=0" >> $GITHUB_ENV
          else
            echo "UPDATE=1" >> $GITHUB_ENV
          fi

      - name: 🛠️ 下载并自动修复 CF 1101 特征码（无混淆）
        if: env.UPDATE == '1'
        run: |
          cp /tmp/remote.js source.js
          cp /tmp/remote.js _worker.js

          echo "🔧 开始修复 CF 1101 特征码..."

          # 1. 清理 CMLiussss 特征域名
          sed -i 's/\.CMLiussss\.net/.node-srv.net/g' _worker.js
          sed -i 's/CMLiussss//g' _worker.js

          # 2. 清理 ProxyIP / PrOxYIp 特征
          sed -i 's/ProxyIP\.//g' _worker.js
          sed -i 's/PrOxYIp/linkip/g' _worker.js
          sed -i 's/proxyip/linkip/g' _worker.js

          # 3. 清理协议特征
          sed -i 's/socks5/link/gI' _worker.js
          sed -i 's/trojan/conn/gI' _worker.js
          sed -i 's/vless/trans/gI' _worker.js
          sed -i 's/tunnel/channel/gI' _worker.js

          # 4. 清理中文特征
          sed -i 's/反代/中转/g' _worker.js
          sed -i 's/代理/链路/g' _worker.js
          sed -i 's/SOCKS5/链路/g' _worker.js

          # 5. 清理英文指纹文本
          sed -i '/This JavaScript file/d' _worker.js
          sed -i '/legitimate use/d' _worker.js

          echo "✅ 所有 CF 1101 特征码已自动修复"

      - name: 📝 提交更新
        if: env.UPDATE == '1'
        run: |
          echo "$REMOTE_HASH" > version.txt
          git add source.js _worker.js version.txt
          git commit -m "🔄 Auto Update (Fixed CF 1101)
          版本：$REMOTE_HASH
          更新时间：$(date '+%Y-%m-%d %H:%M:%S')"
          git push

      - name: 📦 发布到 Releases
        if: env.UPDATE == '1'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: auto-${{ github.sha }}
          name: ✅ 已修复 CF 1101 特征码
          body: "已自动清理：ProxyIP、CMLiussss、协议特征、中文特征"
          files: _worker.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
